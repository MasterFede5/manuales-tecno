<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1150" viewBox="0 0 1800 1150">
  <rect width="1800" height="1150" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1800" height="150" fill="#0E3A8A"/>
  <rect x="0" y="150" width="1800" height="14" fill="#F59E0B"/>
  <text x="76" y="72" font-size="48" fill="#FFFFFF" font-weight="850"><tspan x="76" dy="0">Estadística para Entender Datos</tspan></text>
  <text x="78" y="210" font-size="30" fill="#334155" font-weight="600"><tspan x="78" dy="0">El equipo analiza si horas de estudio y calificación se relacionan.</tspan></text>
  <rect x="78" y="260" width="520" height="250" rx="0" fill="#DBEAFE" stroke="#0E3A8A" stroke-width="5"/><text x="106" y="316" font-size="34" fill="#0E3A8A" font-weight="800"><tspan x="106" dy="0">Historia</tspan></text><text x="106" y="378" font-size="28" fill="#172033" font-weight="500"><tspan x="106" dy="0">La estadística descriptiva</tspan><tspan x="106" dy="35">permite distinguir patrón,</tspan><tspan x="106" dy="35">variación y casualidad. Antes</tspan><tspan x="106" dy="35">de afirmar que una variable</tspan><tspan x="106" dy="35">causa otra, se revisan</tspan><tspan x="106" dy="35">medias, dispers</tspan></text><rect x="663" y="260" width="520" height="250" rx="0" fill="#DCFCE7" stroke="#15803D" stroke-width="5"/><text x="691" y="316" font-size="34" fill="#15803D" font-weight="800"><tspan x="691" dy="0">Analogía</tspan></text><text x="691" y="378" font-size="28" fill="#172033" font-weight="500"><tspan x="691" dy="0">La estadística es como una</tspan><tspan x="691" dy="35">lupa con escala: acerca los</tspan><tspan x="691" dy="35">datos, pero también muestra</tspan><tspan x="691" dy="35">cuánto varían.</tspan></text><rect x="1248" y="260" width="520" height="250" rx="0" fill="#FEF3C7" stroke="#B45309" stroke-width="5"/><text x="1276" y="316" font-size="34" fill="#B45309" font-weight="800"><tspan x="1276" dy="0">Producto</tspan></text><text x="1276" y="378" font-size="28" fill="#172033" font-weight="500"><tspan x="1276" dy="0">Informe estadístico de</tspan><tspan x="1276" dy="35">relación entre horas de</tspan><tspan x="1276" dy="35">estudio y calificación.</tspan></text><rect x="78" y="580" width="520" height="250" rx="0" fill="#E0F2FE" stroke="#0E7490" stroke-width="5"/><text x="106" y="636" font-size="34" fill="#0E7490" font-weight="800"><tspan x="106" dy="0">Práctica</tspan></text><text x="106" y="698" font-size="28" fill="#172033" font-weight="500"><tspan x="106" dy="0">Calcular medidas, interpretar</tspan><tspan x="106" dy="35">correlación y redactar</tspan><tspan x="106" dy="35">límites de causalidad.</tspan></text><rect x="663" y="580" width="520" height="250" rx="0" fill="#FEE2E2" stroke="#B91C1C" stroke-width="5"/><text x="691" y="636" font-size="34" fill="#B91C1C" font-weight="800"><tspan x="691" dy="0">Primer dato</tspan></text><text x="691" y="698" font-size="28" fill="#172033" font-weight="500"><tspan x="691" dy="0">r = 0.72.</tspan></text><rect x="1248" y="580" width="520" height="250" rx="0" fill="#F5F5F4" stroke="#57534E" stroke-width="5"/><text x="1276" y="636" font-size="34" fill="#57534E" font-weight="800"><tspan x="1276" dy="0">Cierre</tspan></text><text x="1276" y="698" font-size="28" fill="#172033" font-weight="500"><tspan x="1276" dy="0">Defender una decisión con</tspan><tspan x="1276" dy="35">evidencia, no con opinión.</tspan></text>
  <rect x="72" y="1040" width="1656" height="4" fill="#D7DEE8"/>
  <text x="78" y="1090" font-size="28" fill="#526070" font-weight="600"><tspan x="78" dy="0">La imagen funciona como mapa de entrada: ubica historia, producto y criterio antes de</tspan><tspan x="78" dy="35">resolver.</tspan></text>
</svg>