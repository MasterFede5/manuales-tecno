<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1150" viewBox="0 0 1800 1150">
  <rect width="1800" height="1150" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1800" height="150" fill="#0E3A8A"/>
  <rect x="0" y="150" width="1800" height="14" fill="#F59E0B"/>
  <text x="76" y="72" font-size="48" fill="#FFFFFF" font-weight="850"><tspan x="76" dy="0">Modelos clave de Prompt Engineering Fundamental</tspan></text>
  <text x="78" y="210" font-size="30" fill="#334155" font-weight="600"><tspan x="78" dy="0">Cada fórmula o criterio debe tener elementos claros y una escala de revisión.</tspan></text>
  <rect x="78" y="260" width="520" height="250" rx="0" fill="#DBEAFE" stroke="#0E3A8A" stroke-width="5"/><text x="106" y="316" font-size="34" fill="#0E3A8A" font-weight="800"><tspan x="106" dy="0">prompt = rol + tarea +</tspan><tspan x="106" dy="42">contexto + formato +</tspan><tspan x="106" dy="42">criterio</tspan></text><text x="106" y="378" font-size="28" fill="#172033" font-weight="500"><tspan x="106" dy="0">Construir una instrucción</tspan><tspan x="106" dy="35">completa.</tspan></text><rect x="663" y="260" width="520" height="250" rx="0" fill="#DCFCE7" stroke="#15803D" stroke-width="5"/><text x="691" y="316" font-size="34" fill="#15803D" font-weight="800"><tspan x="691" dy="0">puntaje = contenido +</tspan><tspan x="691" dy="42">formato + evidencia +</tspan><tspan x="691" dy="42">seguridad</tspan></text><text x="691" y="378" font-size="28" fill="#172033" font-weight="500"><tspan x="691" dy="0">Evaluar una salida generada.</tspan></text><rect x="1248" y="260" width="520" height="250" rx="0" fill="#FEF3C7" stroke="#B45309" stroke-width="5"/><text x="1276" y="316" font-size="34" fill="#B45309" font-weight="800"><tspan x="1276" dy="0">delta = puntaje v2 -</tspan><tspan x="1276" dy="42">puntaje v1</tspan></text><text x="1276" y="378" font-size="28" fill="#172033" font-weight="500"><tspan x="1276" dy="0">Medir mejora entre</tspan><tspan x="1276" dy="35">iteraciones.</tspan></text><rect x="78" y="580" width="520" height="250" rx="0" fill="#E0F2FE" stroke="#0E7490" stroke-width="5"/><text x="106" y="636" font-size="34" fill="#0E7490" font-weight="800"><tspan x="106" dy="0">ambigüedad = partes</tspan><tspan x="106" dy="42">faltantes / partes</tspan><tspan x="106" dy="42">requeridas</tspan></text><text x="106" y="698" font-size="28" fill="#172033" font-weight="500"><tspan x="106" dy="0">Diagnosticar una instrucción</tspan><tspan x="106" dy="35">incompleta.</tspan></text><rect x="663" y="580" width="520" height="250" rx="0" fill="#FEE2E2" stroke="#B91C1C" stroke-width="5"/><text x="691" y="636" font-size="34" fill="#B91C1C" font-weight="800"><tspan x="691" dy="0">calidad final =</tspan><tspan x="691" dy="42">utilidad x</tspan><tspan x="691" dy="42">verificabilidad</tspan></text><text x="691" y="698" font-size="28" fill="#172033" font-weight="500"><tspan x="691" dy="0">Evitar respuestas bonitas</tspan><tspan x="691" dy="35">pero no comprobables.</tspan></text>
  <rect x="72" y="1040" width="1656" height="4" fill="#D7DEE8"/>
  <text x="78" y="1090" font-size="28" fill="#526070" font-weight="600"><tspan x="78" dy="0">Un resultado sin unidad, criterio o evidencia no está listo para defenderse.</tspan></text>
</svg>