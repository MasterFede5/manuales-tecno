<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1150" viewBox="0 0 1800 1150">
  <rect width="1800" height="1150" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1800" height="150" fill="#0E3A8A"/>
  <rect x="0" y="150" width="1800" height="14" fill="#F59E0B"/>
  <text x="76" y="72" font-size="48" fill="#FFFFFF" font-weight="850"><tspan x="76" dy="0">Fundamentos e Historia de la IA</tspan></text>
  <text x="78" y="210" font-size="30" fill="#334155" font-weight="600"><tspan x="78" dy="0">Antes de construir el tutor, el equipo entiende qué hace posible a la IA y qué</tspan><tspan x="78" dy="37">límites conserva.</tspan></text>
  <rect x="78" y="260" width="520" height="250" rx="0" fill="#DBEAFE" stroke="#0E3A8A" stroke-width="5"/><text x="106" y="316" font-size="34" fill="#0E3A8A" font-weight="800"><tspan x="106" dy="0">Historia</tspan></text><text x="106" y="378" font-size="28" fill="#172033" font-weight="500"><tspan x="106" dy="0">La historia de la</tspan><tspan x="106" dy="35">inteligencia artificial no</tspan><tspan x="106" dy="35">avanza como una línea recta.</tspan><tspan x="106" dy="35">Pasa por preguntas</tspan><tspan x="106" dy="35">filosóficas, laboratorios</tspan><tspan x="106" dy="35">universitarios, inviernos de</tspan><tspan x="106" dy="35">ba</tspan></text><rect x="663" y="260" width="520" height="250" rx="0" fill="#DCFCE7" stroke="#15803D" stroke-width="5"/><text x="691" y="316" font-size="34" fill="#15803D" font-weight="800"><tspan x="691" dy="0">Analogía</tspan></text><text x="691" y="378" font-size="28" fill="#172033" font-weight="500"><tspan x="691" dy="0">La IA se parece a un</tspan><tspan x="691" dy="35">estudiante entrenado con</tspan><tspan x="691" dy="35">muchos ejemplos: puede</tspan><tspan x="691" dy="35">reconocer patrones, pero</tspan><tspan x="691" dy="35">necesita una consigna clara y</tspan><tspan x="691" dy="35">una revisión externa.</tspan></text><rect x="1248" y="260" width="520" height="250" rx="0" fill="#FEF3C7" stroke="#B45309" stroke-width="5"/><text x="1276" y="316" font-size="34" fill="#B45309" font-weight="800"><tspan x="1276" dy="0">Producto</tspan></text><text x="1276" y="378" font-size="28" fill="#172033" font-weight="500"><tspan x="1276" dy="0">Línea de tiempo comentada y</tspan><tspan x="1276" dy="35">definición operativa del</tspan><tspan x="1276" dy="35">tutor IA.</tspan></text><rect x="78" y="580" width="520" height="250" rx="0" fill="#E0F2FE" stroke="#0E7490" stroke-width="5"/><text x="106" y="636" font-size="34" fill="#0E7490" font-weight="800"><tspan x="106" dy="0">Práctica</tspan></text><text x="106" y="698" font-size="28" fill="#172033" font-weight="500"><tspan x="106" dy="0">Evaluar una respuesta</tspan><tspan x="106" dy="35">generada, corregirla y</tspan><tspan x="106" dy="35">convertirla en una</tspan><tspan x="106" dy="35">explicación verificable.</tspan></text><rect x="663" y="580" width="520" height="250" rx="0" fill="#FEE2E2" stroke="#B91C1C" stroke-width="5"/><text x="691" y="636" font-size="34" fill="#B91C1C" font-weight="800"><tspan x="691" dy="0">Primer dato</tspan></text><text x="691" y="698" font-size="28" fill="#172033" font-weight="500"><tspan x="691" dy="0">La respuesta tiene 8</tspan><tspan x="691" dy="35">afirmaciones revisables.</tspan></text><rect x="1248" y="580" width="520" height="250" rx="0" fill="#F5F5F4" stroke="#57534E" stroke-width="5"/><text x="1276" y="636" font-size="34" fill="#57534E" font-weight="800"><tspan x="1276" dy="0">Cierre</tspan></text><text x="1276" y="698" font-size="28" fill="#172033" font-weight="500"><tspan x="1276" dy="0">Defender una decisión con</tspan><tspan x="1276" dy="35">evidencia, no con opinión.</tspan></text>
  <rect x="72" y="1040" width="1656" height="4" fill="#D7DEE8"/>
  <text x="78" y="1090" font-size="28" fill="#526070" font-weight="600"><tspan x="78" dy="0">La imagen funciona como mapa de entrada: ubica historia, producto y criterio antes de</tspan><tspan x="78" dy="35">resolver.</tspan></text>
</svg>