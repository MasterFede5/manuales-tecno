  <rect x="0" y="150" width="1800" height="14" fill="#F59E0B"/>
  <text x="76" y="72" font-size="48" fill="#FFFFFF" font-weight="850"><tspan x="76" dy="0">Modelos clave de Tu Primer Asistente</tspan><tspan x="76" dy="60">Conversacional</tspan></text>
  <text x="78" y="210" font-size="30" fill="#334155" font-weight="600"><tspan x="78" dy="0">Cada fórmula o criterio debe tener elementos claros y una escala de revisión.</tspan></text>
  <rect x="78" y="260" width="520" height="250" rx="0" fill="#DBEAFE" stroke="#0E3A8A" stroke-width="5"/><text x="106" y="316" font-size="34" fill="#0E3A8A" font-weight="800"><tspan x="106" dy="0">costo estimado = tokens</tspan><tspan x="106" dy="42">x tarifa</tspan></text><text x="106" y="378" font-size="28" fill="#172033" font-weight="500"><tspan x="106" dy="0">Comprender consumo cuando una</tspan><tspan x="106" dy="35">herramienta cobra por uso.</tspan></text><rect x="663" y="260" width="520" height="250" rx="0" fill="#DCFCE7" stroke="#15803D" stroke-width="5"/><text x="691" y="316" font-size="34" fill="#15803D" font-weight="800"><tspan x="691" dy="0">tasa de verificación =</tspan><tspan x="691" dy="42">afirmaciones</tspan><tspan x="691" dy="42">comprobadas /</tspan><tspan x="691" dy="42">afirmaciones totales</tspan></text><text x="691" y="378" font-size="28" fill="#172033" font-weight="500"><tspan x="691" dy="0">Medir qué tanto se pudo</tspan><tspan x="691" dy="35">verificar una respuesta.</tspan></text><rect x="1248" y="260" width="520" height="250" rx="0" fill="#FEF3C7" stroke="#B45309" stroke-width="5"/><text x="1276" y="316" font-size="34" fill="#B45309" font-weight="800"><tspan x="1276" dy="0">utilidad = claridad +</tspan><tspan x="1276" dy="42">contexto +</tspan><tspan x="1276" dy="42">verificabilidad</tspan></text><text x="1276" y="378" font-size="28" fill="#172033" font-weight="500"><tspan x="1276" dy="0">Comparar dos respuestas con</tspan><tspan x="1276" dy="35">rúbrica.</tspan></text><rect x="78" y="580" width="520" height="250" rx="0" fill="#E0F2FE" stroke="#0E7490" stroke-width="5"/><text x="106" y="636" font-size="34" fill="#0E7490" font-weight="800"><tspan x="106" dy="0">privacidad =</tspan><tspan x="106" dy="42">sensibilidad x</tspan><tspan x="106" dy="42">exposición</tspan></text><text x="106" y="698" font-size="28" fill="#172033" font-weight="500"><tspan x="106" dy="0">Valorar riesgo de compartir</tspan><tspan x="106" dy="35">datos.</tspan></text><rect x="663" y="580" width="520" height="250" rx="0" fill="#FEE2E2" stroke="#B91C1C" stroke-width="5"/><text x="691" y="636" font-size="34" fill="#B91C1C" font-weight="800"><tspan x="691" dy="0">mejora = respuesta</tspan><tspan x="691" dy="42">revisada - respuesta</tspan><tspan x="691" dy="42">inicial</tspan></text><text x="691" y="698" font-size="28" fill="#172033" font-weight="500"><tspan x="691" dy="0">Medir iteración de</tspan><tspan x="691" dy="35">conversación.</tspan></text>
  <rect x="72" y="1040" width="1656" height="4" fill="#D7DEE8"/>
  <text x="78" y="1090" font-size="28" fill="#526070" font-weight="600"><tspan x="78" dy="0">Un resultado sin unidad, criterio o evidencia no está listo para defenderse.</tspan></text>
