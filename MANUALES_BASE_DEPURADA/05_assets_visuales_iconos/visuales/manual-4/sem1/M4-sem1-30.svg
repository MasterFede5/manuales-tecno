  <text x="76" y="72" font-size="48" fill="#FFFFFF" font-weight="850"><tspan x="76" dy="0">Inteligencia Artificial Avanzada</tspan></text>
  <text x="78" y="210" font-size="30" fill="#334155" font-weight="600"><tspan x="78" dy="0">Primer semestre: historia, modelos, práctica y evidencia imprimible.</tspan></text>
  <rect x="78" y="260" width="520" height="250" rx="0" fill="#DBEAFE" stroke="#0E3A8A" stroke-width="5"/><text x="106" y="316" font-size="34" fill="#0E3A8A" font-weight="800"><tspan x="106" dy="0">Caso conductor</tspan></text><text x="106" y="378" font-size="28" fill="#172033" font-weight="500"><tspan x="106" dy="0">Asistente Institucional</tspan><tspan x="106" dy="35">Albatros</tspan></text><rect x="663" y="260" width="520" height="250" rx="0" fill="#DCFCE7" stroke="#15803D" stroke-width="5"/><text x="691" y="316" font-size="34" fill="#15803D" font-weight="800"><tspan x="691" dy="0">40% teoría</tspan></text><text x="691" y="378" font-size="28" fill="#172033" font-weight="500"><tspan x="691" dy="0">Conceptos, historia, modelos,</tspan><tspan x="691" dy="35">criterios y lenguaje técnico.</tspan></text><rect x="1248" y="260" width="520" height="250" rx="0" fill="#FEF3C7" stroke="#B45309" stroke-width="5"/><text x="1276" y="316" font-size="34" fill="#B45309" font-weight="800"><tspan x="1276" dy="0">60% práctica</tspan></text><text x="1276" y="378" font-size="28" fill="#172033" font-weight="500"><tspan x="1276" dy="0">Ejercicios, comparación,</tspan><tspan x="1276" dy="35">verificación, producto y</tspan><tspan x="1276" dy="35">defensa.</tspan></text><rect x="78" y="580" width="520" height="250" rx="0" fill="#E0F2FE" stroke="#0E7490" stroke-width="5"/><text x="106" y="636" font-size="34" fill="#0E7490" font-weight="800"><tspan x="106" dy="0">Revisión visual</tspan></text><text x="106" y="698" font-size="28" fill="#172033" font-weight="500"><tspan x="106" dy="0">Infografías grandes, texto</tspan><tspan x="106" dy="35">legible y sin marcos que</tspan><tspan x="106" dy="35">reduzcan contenido.</tspan></text><rect x="663" y="580" width="520" height="250" rx="0" fill="#FEE2E2" stroke="#B91C1C" stroke-width="5"/><text x="691" y="636" font-size="34" fill="#B91C1C" font-weight="800"><tspan x="691" dy="0">Cierre</tspan></text><text x="691" y="698" font-size="28" fill="#172033" font-weight="500"><tspan x="691" dy="0">Examen integrador,</tspan><tspan x="691" dy="35">bibliografía, recursos,</tspan><tspan x="691" dy="35">glosario e índice analítico.</tspan></text><rect x="1248" y="580" width="520" height="250" rx="0" fill="#F5F5F4" stroke="#57534E" stroke-width="5"/><text x="1276" y="636" font-size="34" fill="#57534E" font-weight="800"><tspan x="1276" dy="0">Colegio</tspan></text><text x="1276" y="698" font-size="28" fill="#172033" font-weight="500"><tspan x="1276" dy="0">Colegio Nuevo Tecno.</tspan></text>
  <rect x="72" y="1040" width="1656" height="4" fill="#D7DEE8"/>
  <text x="78" y="1090" font-size="28" fill="#526070" font-weight="600"><tspan x="78" dy="0">La unidad no avanza por memoria: avanza cuando el estudiante deja evidencia revisable.</tspan></text>
