<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 56px; font-weight: 800; fill: #0E3A8A; }
      .subtitle { font-family: Arial, sans-serif; font-size: 30px; font-weight: 600; fill: #5B6472; }
      .h { font-family: Arial, sans-serif; font-size: 34px; font-weight: 800; fill: #0E3A8A; }
      .body { font-family: Arial, sans-serif; font-size: 27px; font-weight: 600; fill: #172033; }
      .small { font-family: Arial, sans-serif; font-size: 23px; font-weight: 600; fill: #5B6472; }
      .formula { font-family: Arial, sans-serif; font-size: 35px; font-weight: 800; fill: #F39C12; }
      .label { font-family: Arial, sans-serif; font-size: 25px; font-weight: 800; fill: white; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
  <rect x="0" y="0" width="1536" height="18" fill="#F39C12"/>
  <text x="54" y="76" class="title">Movimiento circular uniforme</text>
  <text x="56" y="120" class="subtitle">La rapidez puede ser constante, pero la dirección cambia</text>

  <circle cx="500" cy="520" r="245" fill="none" stroke="#0E3A8A" stroke-width="10"/>
  <circle cx="500" cy="520" r="16" fill="#172033"/>
  <circle cx="745" cy="520" r="32" fill="#F39C12"/>
  <line x1="745" y1="520" x2="500" y2="520" stroke="#15803D" stroke-width="8" marker-end="url(#none)"/>
  <line x1="745" y1="520" x2="745" y2="330" stroke="#0E7490" stroke-width="8"/>
  <text x="606" y="492" class="body">r</text>
  <text x="760" y="350" class="body">v tangencial</text>
  <text x="570" y="565" class="body">ac hacia el centro</text>

  <rect x="900" y="210" width="430" height="230" rx="18" fill="#F7FAFC" stroke="#D8DEE9" stroke-width="3"/>
  <rect x="900" y="210" width="430" height="58" rx="18" fill="#0E3A8A"/>
  <text x="928" y="250" class="label">Idea clave</text>
  <text x="928" y="302" class="body">La rapidez puede no cambiar</text><text x="928" y="338" class="body">La dirección sí cambia</text><text x="928" y="374" class="body">Por eso existe aceleración</text>
  

  <rect x="900" y="500" width="430" height="230" rx="18" fill="#F7FAFC" stroke="#D8DEE9" stroke-width="3"/>
  <rect x="900" y="500" width="430" height="58" rx="18" fill="#F39C12"/>
  <text x="928" y="540" class="label">Fórmulas</text>
  <text x="928" y="592" class="body">ac: aceleración centrípeta</text><text x="928" y="628" class="body">v: rapidez tangencial</text><text x="928" y="664" class="body">r: radio de giro</text>
  <text x="928" y="696" class="formula">ac = v² / r</text>

  <text x="768" y="900" text-anchor="middle" class="formula">Girar exige fuerza y aceleración hacia el centro.</text>

  <text x="1480" y="989" text-anchor="end" class="small">Colegio Nuevo Tecno · Física · Unidad 1</text>
</svg>
