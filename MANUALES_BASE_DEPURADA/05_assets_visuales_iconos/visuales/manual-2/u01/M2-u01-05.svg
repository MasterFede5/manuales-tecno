<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 56px; font-weight: 800; fill: #0E3A8A; }
      .subtitle { font-family: Arial, sans-serif; font-size: 30px; font-weight: 600; fill: #5B6472; }
      .h { font-family: Arial, sans-serif; font-size: 34px; font-weight: 800; fill: #0E3A8A; }
      .body { font-family: Arial, sans-serif; font-size: 27px; font-weight: 600; fill: #172033; }
      .small { font-family: Arial, sans-serif; font-size: 23px; font-weight: 600; fill: #5B6472; }
      .formula { font-family: Arial, sans-serif; font-size: 35px; font-weight: 800; fill: #F39C12; }
      .label { font-family: Arial, sans-serif; font-size: 25px; font-weight: 800; fill: white; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
  <rect x="0" y="0" width="1536" height="18" fill="#F39C12"/>
  <text x="54" y="76" class="title">MRU: movimiento rectilíneo uniforme</text>
  <text x="56" y="120" class="subtitle">La velocidad permanece constante y la aceleración es cero</text>

  <line x1="130" y1="760" x2="1370" y2="760" stroke="#D8DEE9" stroke-width="6"/>
  <circle cx="220" cy="760" r="24" fill="#0E3A8A"/><text x="220" y="815" text-anchor="middle" class="small">0 s</text>
  <circle cx="510" cy="760" r="24" fill="#0E3A8A"/><text x="510" y="815" text-anchor="middle" class="small">1 s</text>
  <circle cx="800" cy="760" r="24" fill="#0E3A8A"/><text x="800" y="815" text-anchor="middle" class="small">2 s</text>
  <circle cx="1090" cy="760" r="24" fill="#0E3A8A"/><text x="1090" y="815" text-anchor="middle" class="small">3 s</text>
  <text x="760" y="890" text-anchor="middle" class="formula">Distancias iguales en tiempos iguales</text>

  <rect x="80" y="175" width="430" height="330" rx="18" fill="#F7FAFC" stroke="#D8DEE9" stroke-width="3"/>
  <rect x="80" y="175" width="430" height="58" rx="18" fill="#0E3A8A"/>
  <text x="108" y="215" class="label">Gráfica x-t</text>
  <text x="108" y="267" class="body">Recta ascendente</text><text x="108" y="303" class="body">La pendiente es v</text><text x="108" y="339" class="body">Más inclinada = más rápida</text>
  <text x="108" y="471" class="formula">v = Δx / Δt</text>

  <rect x="548" y="175" width="430" height="330" rx="18" fill="#F7FAFC" stroke="#D8DEE9" stroke-width="3"/>
  <rect x="548" y="175" width="430" height="58" rx="18" fill="#0E7490"/>
  <text x="576" y="215" class="label">Gráfica v-t</text>
  <text x="576" y="267" class="body">Línea horizontal</text><text x="576" y="303" class="body">Velocidad constante</text><text x="576" y="339" class="body">Área = desplazamiento</text>
  <text x="576" y="471" class="formula">Δx = v · t</text>

  <rect x="1016" y="175" width="430" height="330" rx="18" fill="#F7FAFC" stroke="#D8DEE9" stroke-width="3"/>
  <rect x="1016" y="175" width="430" height="58" rx="18" fill="#15803D"/>
  <text x="1044" y="215" class="label">Gráfica a-t</text>
  <text x="1044" y="267" class="body">Línea en cero</text><text x="1044" y="303" class="body">No cambia la velocidad</text><text x="1044" y="339" class="body">No hay aceleración</text>
  <text x="1044" y="471" class="formula">a = 0</text>

  <text x="1480" y="989" text-anchor="end" class="small">Colegio Nuevo Tecno · Física · Unidad 1</text>
</svg>
